<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI会议预演工作台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .prose h1, .prose h2, .prose h3 { color: #0f172a; }
    .prose h1 { font-size: 1.35rem; margin-top: 0.5rem; margin-bottom: 0.8rem; }
    .prose h2 { font-size: 1.15rem; margin-top: 1.1rem; margin-bottom: 0.6rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.35rem; }
    .prose h3 { font-size: 1rem; margin-top: 0.9rem; margin-bottom: 0.45rem; }
    .prose p, .prose li { color: #334155; line-height: 1.75; }
    .prose ul { margin-top: 0.4rem; margin-bottom: 0.7rem; }
    .prose strong { color: #111827; }

    .loader {
      border-top-color: #2563eb;
      animation: spinner 1s linear infinite;
    }

    @keyframes spinner {
      0% { transform: rotate(0deg);}
      100% { transform: rotate(360deg);}
    }
  </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

  <div class="max-w-7xl mx-auto p-4 md:p-6">
    <header class="bg-slate-900 text-white rounded-2xl shadow px-5 py-4 flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-4">
      <div>
        <h1 class="text-xl font-bold tracking-wide">AI会议预演工作台</h1>
        <p class="text-xs text-slate-300 mt-1">基于 GitHub 知识库 + Vercel /api/chat 代理 + AI 模型生成会议预演蓝图</p>
      </div>
      <div>
        <span id="dbStatus" class="inline-block px-3 py-1 rounded-full text-xs font-semibold bg-slate-800 text-amber-300">
          🟡 等待拉取 GitHub 知识库
        </span>
      </div>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-5 gap-4">
      <!-- 左侧输入区 -->
      <section class="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="px-5 py-4 border-b border-slate-200 bg-slate-50">
          <h2 class="text-base font-bold text-slate-800">预演前输入</h2>
          <p class="text-xs text-slate-500 mt-1">先拉取知识库，再填写本次会议预演信息</p>
        </div>

        <div class="p-5 space-y-5">
          <!-- GitHub知识库 -->
          <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 space-y-3">
            <div>
              <label class="block text-xs font-bold text-slate-600 mb-1">GitHub Raw 知识库直链</label>
              <input
                id="githubUrl"
                type="text"
                class="w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none focus:border-blue-500"
                placeholder="https://raw.githubusercontent.com/.../CEO_Knowledge.txt"
              />
            </div>

            <div class="flex gap-2">
              <button
                onclick="loadKnowledge()"
                class="flex-1 bg-slate-800 hover:bg-slate-700 text-white text-sm font-bold py-2.5 rounded-lg"
              >
                🔄 拉取知识库
              </button>
              <button
                onclick="clearCachedKnowledge()"
                class="px-4 bg-slate-200 hover:bg-slate-300 text-slate-700 text-sm font-bold py-2.5 rounded-lg"
              >
                清空
              </button>
            </div>

            <p class="text-[11px] text-slate-500">
              当前页面默认调用同域代理接口 <code>/api/chat</code>，不需要在前端填写 API Key。
            </p>
          </div>

          <!-- 会议输入 -->
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-1">① 会议主题</label>
              <input
                id="meetingTopic"
                type="text"
                class="w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none focus:border-blue-500"
                value="凝胶下沉战役上线决策会"
              />
            </div>

            <div>
              <label class="block text-sm font-bold text-slate-700 mb-1">② 会议类型</label>
              <select
                id="meetingType"
                class="w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none focus:border-blue-500 bg-white"
              >
                <option value="决策会" selected>决策会</option>
                <option value="高管周会">高管周会</option>
                <option value="高管月会">高管月会</option>
                <option value="月度经营分析会">月度经营分析会</option>
                <option value="项目启动会">项目启动会</option>
                <option value="项目复盘会">项目复盘会</option>
                <option value="专项讨论会">专项讨论会</option>
              </select>
            </div>

            <div>
              <label class="block text-sm font-bold text-slate-700 mb-1">③ 本次会议要解决的核心问题</label>
              <textarea
                id="coreProblem"
                rows="3"
                class="w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none resize-none focus:border-blue-500 leading-relaxed"
              >决策是否在3/16立马上线低价凝胶</textarea>
            </div>

            <div>
              <label class="block text-sm font-bold text-slate-700 mb-1">④ 拟定参会人员</label>
              <textarea
                id="attendees"
                rows="3"
                class="w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none resize-none focus:border-blue-500 leading-relaxed"
              >CEO
渠道负责人
销售运营中心负责人</textarea>
            </div>

            <div>
              <label class="block text-sm font-bold text-slate-700 mb-1">⑤ 业务背景与当前分歧</label>
              <textarea
                id="meetingBackground"
                rows="6"
                class="w-full border border-slate-300 rounded-lg p-2.5 text-sm outline-none resize-none focus:border-blue-500 leading-relaxed"
              >低价凝胶想周五约一个会决策16上不上
(可能性1:如果3/15风平浪静,16就直接上;可能性2:等确定没有报道相关的舆情风险后,某一个时间上,比如P0方案确定可行的时间)</textarea>
            </div>
          </div>
        </div>

        <div class="p-4 border-t border-slate-200 bg-slate-50">
          <button
            onclick="runPreview()"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-sm"
          >
            🧠 生成会议预演蓝图
          </button>
        </div>
      </section>

      <!-- 右侧输出区 -->
      <section class="lg:col-span-3 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden relative">
        <div class="px-5 py-4 border-b border-slate-200 bg-slate-50 flex items-center justify-between gap-3">
          <div>
            <h2 class="text-base font-bold text-slate-800">AI 输出结果</h2>
            <p class="text-xs text-slate-500 mt-1">输出结构按照标准 Markdown 提示词生成</p>
          </div>
        </div>

        <div id="reportArea" class="p-6 md:p-8 prose max-w-none min-h-[640px]">
          <div id="placeholder" class="h-[560px] flex flex-col items-center justify-center text-slate-400 text-center">
            <div class="text-5xl mb-3">🧭</div>
            <p class="font-medium">请先拉取 GitHub 知识库，再点击“生成会议预演蓝图”</p>
          </div>
        </div>

        <div
          id="loadingOverlay"
          class="absolute inset-0 bg-white/90 backdrop-blur-sm hidden flex-col items-center justify-center z-10"
        >
          <div class="loader rounded-full border-4 border-slate-200 h-14 w-14 mb-4"></div>
          <h3 id="loadingText" class="text-slate-800 text-lg font-bold">正在生成会议预演蓝图...</h3>
          <p class="text-xs text-slate-500 mt-1">系统正在读取知识库并调用 AI 进行推理</p>
        </div>
      </section>
    </main>
  </div>

<script>
  let cachedKnowledge = "";

  window.onload = function () {
    const savedGitHubUrl = localStorage.getItem("githubUrl");
    if (savedGitHubUrl) {
      document.getElementById("githubUrl").value = savedGitHubUrl;
    }
  };

  function saveConfig() {
    const githubUrl = document.getElementById("githubUrl")?.value.trim() || "";
    localStorage.setItem("githubUrl", githubUrl);
  }

  function setStatus(type, text) {
    const status = document.getElementById("dbStatus");
    if (!status) return;

    if (type === "loading") {
      status.className = "inline-block px-3 py-1 rounded-full text-xs font-semibold bg-blue-100 text-blue-700";
    } else if (type === "success") {
      status.className = "inline-block px-3 py-1 rounded-full text-xs font-semibold bg-emerald-100 text-emerald-700";
    } else if (type === "error") {
      status.className = "inline-block px-3 py-1 rounded-full text-xs font-semibold bg-red-100 text-red-700";
    } else {
      status.className = "inline-block px-3 py-1 rounded-full text-xs font-semibold bg-slate-800 text-amber-300";
    }

    status.innerText = text;
  }

  async function loadKnowledge() {
    const githubInput = document.getElementById("githubUrl");
    const url = githubInput ? githubInput.value.trim() : "";

    if (!url) {
      alert("请先填写 GitHub Raw 知识库直链");
      return;
    }

    saveConfig();
    setStatus("loading", "🔄 正在拉取 GitHub 知识库...");

    try {
      const fetchUrl = url + (url.includes("?") ? "&" : "?") + "t=" + Date.now();
      const response = await fetch(fetchUrl);

      if (!response.ok) {
        throw new Error("GitHub Raw 链接无效或不可访问");
      }

      cachedKnowledge = await response.text();
      setStatus("success", `🟢 知识库已同步 (${(cachedKnowledge.length / 1000).toFixed(1)}k 字符)`);
    } catch (error) {
      cachedKnowledge = "";
      setStatus("error", "🔴 GitHub 同步失败，请检查 Raw 链接");
      alert("知识库拉取失败：\n" + error.message);
    }
  }

  function clearCachedKnowledge() {
    cachedKnowledge = "";
    setStatus("idle", "🟡 等待拉取 GitHub 知识库");

    const reportArea = document.getElementById("reportArea");
    if (reportArea) {
      reportArea.innerHTML = `
        <div id="placeholder" class="h-[560px] flex flex-col items-center justify-center text-slate-400 text-center">
          <div class="text-5xl mb-3">🧭</div>
          <p class="font-medium">请先拉取 GitHub 知识库，再点击“生成会议预演蓝图”</p>
        </div>
      `;
    }
  }

  function showLoading(text) {
    const loadingText = document.getElementById("loadingText");
    if (loadingText) loadingText.innerText = text;

    const overlay = document.getElementById("loadingOverlay");
    if (overlay) {
      overlay.classList.remove("hidden");
      overlay.classList.add("flex");
    }

    const placeholder = document.getElementById("placeholder");
    if (placeholder) placeholder.style.display = "none";
  }

  function hideLoading() {
    const overlay = document.getElementById("loadingOverlay");
    if (overlay) {
      overlay.classList.add("hidden");
      overlay.classList.remove("flex");
    }
  }

  function buildPrompt() {
    return `# 角色设定

你是公司 CEO 的数字幕僚。

你的任务不是简单回答问题，而是基于 **CEO 思维模型**、**会议类型的历史会议案例**、**企业战略画布** 和 **飞书企业知识库**，对当前拟开的会议进行预演分析，判断该会议是否有必要召开，并在必要时生成高质量的会议蓝图。

---

# 输入信息

你将获得以下信息：

- **拟开会议主题**
- **会议类型**
- **拟定参会人**
- **要解决的核心问题**
- **业务背景与当前分歧**
- **飞书企业知识库**

---

# 推理规则

请严格遵循以下规则进行分析：

1. **优先调用知识库中的 CEO 思维模型** 以及 **对应会议类型的历史会议案例**
2. **结合企业战略画布**，从 CEO 视角进行判断
3. **先判断会议是否有必要召开**
4. 如果 **无需开会**，请直接给出可执行的解决方案
5. 如果 **必须开会**，请生成完整的会议预演蓝图

---

# 输出结构

## 第一部分：CEO 数字大脑判断

### 1. 调用的思维模型
说明本次问题最适合调用的 CEO 思维模型是什么，并解释为什么。

### 2. CEO 视角破题
基于思维模型、战略画布和历史会议案例，从 CEO 视角给出对当前问题的核心判断与分析。

### 3. 会议必要性判定
请明确判断以下三种情况中的哪一种最适合，并说明原因：

- **建议取消会议**
- **建议降级处理（如邮件 / 文档异步沟通）**
- **必须开会**

---

## 第二部分：AI 会议预演蓝图
> 仅在判定为“必须开会”时输出本部分

### 1. 谁必须参加
列出必须参加会议的岗位 / 角色，并说明他们为什么必须在场。

### 2. 各自应做什么贡献
说明每个参会角色在会议中必须输出的关键观点、决策或信息。

### 3. 提前准备什么信息
列出会前必须准备的数据、材料、报告或草案。

### 4. 备选理论框架
除了 CEO 已调用的核心模型外，还可以从哪些理论框架进行辅助讨论。

### 5. 成功会议成果样例
给出一个“如果这场会议开得非常成功，最终会产出什么”的具体样例。

### 6. 建议议程
输出一个清晰、高效的会议议程安排。

### 7. CEO 关键拍板点
指出 CEO 在本次会议中最需要关注、拍板或提升决策质量的关键环节。

---

# 输出质量标准

每次输出必须满足以下要求：

- **必须调用思维模型**
- **必须判断会议必要性**
- **必须给出参会人**
- **必须给出议程**
- **必须给出成果样例**

---

# 输出要求

- 输出逻辑必须清晰
- 语言必须简洁、专业、可执行
- 避免空泛表达
- 尽量输出可直接用于会前准备和会议组织的内容`;
  }

  async function runPreview() {
    if (!cachedKnowledge) {
      alert("请先拉取 GitHub 知识库");
      return;
    }

    const meetingTopic = document.getElementById("meetingTopic")?.value.trim() || "";
    const meetingType = document.getElementById("meetingType")?.value.trim() || "";
    const coreProblem = document.getElementById("coreProblem")?.value.trim() || "";
    const attendees = document.getElementById("attendees")?.value.trim() || "";
    const meetingBackground = document.getElementById("meetingBackground")?.value.trim() || "";

    if (!meetingTopic || !meetingType || !coreProblem || !attendees || !meetingBackground) {
      alert("请先完整填写会议主题、会议类型、核心问题、拟定参会人员、业务背景与当前分歧");
      return;
    }

    const systemPrompt = buildPrompt();
    const userContent = `## 本次会议输入

- **会议主题**：${meetingTopic}
- **会议类型**：${meetingType}
- **本次会议要解决的核心问题**：${coreProblem}
- **拟定参会人员**：
${attendees}
- **业务背景与当前分歧**：
${meetingBackground}

---

## 飞书企业知识库（已同步内容）

${cachedKnowledge}`;

    showLoading("正在调用 AI 生成会议预演蓝图...");

    try {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: "gpt-4o-mini",
          messages: [
            { role: "system", content: systemPrompt },
            { role: "user", content: userContent }
          ],
          temperature: 0.2
        })
      });

      const data = await response.json().catch(() => ({}));
      hideLoading();

      if (!response.ok) {
        throw new Error(data?.error?.message || data?.error || `接口调用失败 (${response.status})`);
      }

      const content = data?.choices?.[0]?.message?.content;
      if (!content) {
        throw new Error("模型返回为空，请检查 /api/chat 返回格式");
      }

      const reportArea = document.getElementById("reportArea");
      if (reportArea) {
        marked.setOptions({ breaks: true });
        reportArea.innerHTML = marked.parse(content);
      }
    } catch (error) {
      hideLoading();
      alert("生成失败：\n" + error.message);
    }
  }
</script>
</body>
</html>
